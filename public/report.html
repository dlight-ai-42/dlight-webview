<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>健康報告 — 小路光 Dlight</title>
<script src="config.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,'PingFang TC',sans-serif; background:#F7F8FA; color:#1C1C1E; }
.topbar { padding:16px 20px; display:flex; align-items:center; gap:12px; background:#fff; border-bottom:1px solid #F0F0F0; }
.back-btn   { font-size:16px; color:#2D6A9F; cursor:pointer; font-weight:600; }
.page-title { font-size:16px; font-weight:700; }
.report-card { margin:16px; background:#fff; border-radius:16px; padding:20px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.report-date  { font-size:12px; color:#8E8E93; margin-bottom:8px; }
.report-ai    { font-size:10px; color:#aaa; margin-bottom:12px; }
.report-badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; margin-bottom:16px; }
.badge-normal { background:#EAF6EC; color:#1A7A32; }
.badge-watch  { background:#FFF5E5; color:#CC5500; }
.badge-alert  { background:#FDEBEB; color:#CC1800; }
.report-body  { font-size:15px; line-height:2; color:#2C2C2E; white-space:pre-wrap; }
.empty { text-align:center; color:#aaa; padding:60px 20px; font-size:14px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="back-btn" onclick="history.back()">‹ 返回</div>
  <div class="page-title">昨日健康報告</div>
</div>
<div id="content"><div class="empty">報告載入中...</div></div>
<script>
const SB_URL = DLIGHT_CONFIG.SUPABASE_URL;
const SB_KEY = DLIGHT_CONFIG.SUPABASE_ANON_KEY;
const UID = new URLSearchParams(location.search).get('uid') || 1;
const yesterday = new Date(Date.now()-864e5).toISOString().slice(0,10);
const BADGE_MAP = { normal:'正常', watch:'觀察中', alert:'需關注' };
const AI_LABEL = { deepseek:'DeepSeek 生成', claude_fallback:'Claude 生成（備用）' };

(async () => {
  const r = await fetch(
    `${SB_URL}/rest/v1/daily_reports?user_id=eq.${UID}&report_date=eq.${yesterday}`,
    { headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`} }
  );
  const data = await r.json();
  const report = data[0];
  if (!report) {
    document.getElementById('content').innerHTML = '<div class="empty">昨日報告尚未生成<br>每日 08:00 自動生成</div>';
    return;
  }
  const bk = report.risk_summary || 'normal';
  const aiLabel = AI_LABEL[report.ai_source] || 'AI 生成';
  document.getElementById('content').innerHTML = `
    <div class="report-card">
      <div class="report-date">${yesterday} 健康報告</div>
      <div class="report-ai">由 ${aiLabel}</div>
      <div class="report-badge badge-${bk}">${BADGE_MAP[bk]}</div>
      <div class="report-body">${report.content}</div>
    </div>`;
})();
</script>
</body>
</html>
